# CHESS Autonomous Experiment — Full Stack
#
# Usage:
#   docker compose up
#
# This spins up:
#   1. RabbitMQ broker (AMQP message bus for INTERSECT)
#   2. MongoDB (state store for Dial active learning)
#   3. chess-instrument-control-informer (Full HDF5 → New HDF5 + watch for loc files)
#   4. chess-data-egress-service (monitors New HDF5, emits INTERSECT events)
#   5. dial-service (Bayesian optimization / active learning)
#   6. chess-instrument-control-service (writes motor position files for SPEC)
#   7. campaign-orchestrator (REST API on :8000)
#   8. campaign-ui (web UI for campaign load/visualize/start/stop)
#
# The committed reduced fixture is used as default HDF5 source file.
# A shared volume simulates the NFS mount between services.

services:
  # ── Message Broker ──────────────────────────────────────────────
  broker:
    image: bitnamilegacy/rabbitmq:3.13.3
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_mqtt"
      RABBITMQ_USERNAME: "intersect_username"
      RABBITMQ_PASSWORD: "intersect_password"
      RABBITMQ_MANAGEMENT_ALLOW_WEB_ACCESS: "yes"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      retries: 5
      start_period: 15s
      timeout: 10s

  # ── MongoDB (Dial state store) ──────────────────────────────────
  mongodb:
    image: bitnamilegacy/mongodb:8.0
    ports:
      - "27017:27017"
    volumes:
      - dial_mongodb_data:/bitnami/mongodb

  # ── Chess Instrument Control Informer ───────────────────────────
  # Reads the source HDF5 fixture, creates a NEW HDF5 with
  # cloned structure + initial random points, then watches loc_dir
  # for new location files and appends interpolated data.
  informer:
    image: ghcr.io/nsdf-fabric/chess-instrument-control-informer:0.2.0
    volumes:
      - shared-data:/data
      - ./datasets/strain_map.small.nxs:/data/strain_map.nxs:ro
      - ./conf/informer-config.yaml:/app/config.yaml:ro
    command: ["sh", "-c", "mkdir -p /data/autonomous_experiment/experiment1 && chess-instrument-control-informer --config /app/config.yaml"]
    depends_on:
      broker:
        condition: service_healthy

  # ── INTERSECT Data Egress Service ───────────────────────────────
  # Monitors the NEW HDF5 file via SWMR polling and emits
  # new_measurement events into INTERSECT when data changes.
  chess-data-service:
    image: ghcr.io/nsdf-fabric/intersect-chess-data-service:0.1.5
    volumes:
      - shared-data:/data:ro
      - ./conf/data-service.json:/app/local-conf.json:ro
    depends_on:
      broker:
        condition: service_healthy

  # ── Dial Active Learning Service ────────────────────────────────
  # Bayesian optimization: receives measurement data, recommends
  # next point to measure via expected improvement.
  dial:
    image: ghcr.io/intersect-dial/dial:develop
    volumes:
      - ./conf/dial-service.json:/app/local-conf.json:ro
    depends_on:
      broker:
        condition: service_healthy
      mongodb:
        condition: service_started

  # ── INTERSECT Instrument Control Service ────────────────────────
  # Receives next-point recommendations and writes locNNN.txt files
  # that the informer watches and processes.
  chess-instrument-control-service:
    image: ghcr.io/nsdf-fabric/intersect-chess-instrument-control-service:0.1.2
    volumes:
      - shared-data:/data
      - ./conf/instrument-control-service.json:/app/local-conf.json:ro
    depends_on:
      broker:
        condition: service_healthy

  # ── Campaign Orchestrator (REST API) ────────────────────────────
  # Generic INTERSECT campaign orchestrator with REST API.
  # OpenAPI docs at http://localhost:8000/docs
  orchestrator:
    image: ghcr.io/intersect-sdk/campaign-orchestrator:v0.1.3
    ports:
      - "8000:8000"
    environment:
      PRODUCTION: "true"
      API_KEY: "1234567890abcdef1234567890abcdef"
      BROKER_HOST: broker
      BROKER_PORT: 5672
      BROKER_PROTOCOL: amqp0.9.1
      BROKER_USERNAME: intersect_username
      BROKER_PASSWORD: intersect_password
      SYSTEM_NAME: campaign-system
      CAMPAIGN_REPOSITORY_BACKEND: memory
    depends_on:
      broker:
        condition: service_healthy
      mongodb:
        condition: service_started

  # ── Campaign UI (FastAPI + HTMX) ────────────────────────────────
  # Web UI for loading campaigns, visualizing workflow graphs,
  # and submitting/stopping campaigns through the orchestrator API.
  campaign-ui:
    build:
      context: ./campaign-ui
    ports:
      - "8081:8080"
    environment:
      CAMPAIGN_UI_API_KEY: "1234567890abcdef1234567890abcdef"
      CAMPAIGN_UI_ORCH_BASE_URL: "http://orchestrator:8000"
      CAMPAIGN_PRELOAD_DIR: "/campaigns"
    volumes:
      - ./conf:/campaigns/conf:ro
      - ./scenarios:/campaigns/scenarios:ro
    depends_on:
      orchestrator:
        condition: service_started

volumes:
  shared-data:
    driver: local
  dial_mongodb_data:
    driver: local
