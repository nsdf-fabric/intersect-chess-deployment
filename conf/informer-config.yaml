# Informer config for docker-compose deployment.
# The strain_map.nxs is bind-mounted at /data/strain_map.nxs (read-only).
# The shared-data volume is mounted at /data for the new file and loc_dir.

full_file: /data/strain_map.nxs
new_file: /data/new_strain_map.nxs
entry: v8-p3-10s-0deg_dataset1_strainanalysis
detector_ids:
  - 0
  - 2
  - 10
fit: uniform_fit
hkls:
  - "2_2_0"
  - "2_2_2"
  - "4_0_0"
data_group: centers
dataset_names:
  - labx
  - labz
  - values
loc_dir: /data/autonomous_experiment/experiment1
initial_count: 5
seed: 42

# Optional simulated measurement delay per location file (seconds)
measurement_delay_seconds: 1.0
